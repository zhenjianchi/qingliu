name: qingliu
description: 清流 - 健康习惯管理工具 | Qingliu - Healthy Habit Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3

  # UI components
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  flutter_local_notifications: ^17.2.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # App icon (placeholder, replace with actual icon)
  # assets:
  #   - assets/icons/

  fonts:
    # Using system fonts by default (PingFang on iOS, Roboto on Android)