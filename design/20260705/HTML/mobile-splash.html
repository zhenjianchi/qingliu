<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>清流 · 启动页（iOS + Android）</title>
  <style>
    :root {
      --bg: #fbf8f1; --surface: #f3ece0; --surface-warm: #f8f2e6;
      --fg: #2c2620; --fg-2: #5a544a; --muted: #8b7e6e; --meta: #a99c8a;
      --border: #e3d9c4; --border-soft: #ebe3d0;
      --accent: #0071e3; --accent-on: #ffffff;
      --font-display: "SF Pro Display","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
      --font-body: "SF Pro Text","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
      --font-mono: "SF Mono",ui-monospace,Menlo,monospace;
      --leading-body: 1.4; --tracking-display: -0.015em;
      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 18px; --radius-pill: 980px;
      --motion-base: 220ms; --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
      --fs-body: 15px; --fs-sm: 13px; --fs-xs: 11px;
      --fs-display: 30px; --fs-h1: 22px;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: 1.5;
      color: var(--fg);
      background:
        radial-gradient(80% 50% at 50% -8%, color-mix(in oklab, var(--accent) 6%, var(--bg)) 0%, var(--bg) 70%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    .page-top { max-width: 1480px; margin: 0 auto; padding: 32px 28px 0; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .page-top .crumbs { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .page-top .crumbs strong { color: var(--fg); font-weight: 600; }
    .page-top .back { color: var(--accent); font-size: 14px; display: inline-flex; align-items: center; gap: 4px; }
    .page-top .back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .head { max-width: 1480px; margin: 0 auto; padding: 36px 28px 16px; }
    .head .eyebrow { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
    .head h1 { font-family: var(--font-display); font-size: clamp(34px, 5vw, 48px); font-weight: 600; letter-spacing: var(--tracking-display); line-height: 1.06; margin: 0 0 14px; }
    .head .lede { max-width: 60ch; color: var(--fg-2); font-size: 17px; line-height: 1.55; margin: 0; }

    .stage-pair { max-width: 1480px; margin: 0 auto; padding: 0 28px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; justify-items: center; }
    @media (max-width: 1100px) { .stage-pair { grid-template-columns: 1fr; } }

    .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .caption { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    .caption .badge { width: 22px; height: 22px; border-radius: 6px; background: var(--fg); color: var(--bg); display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
    .caption strong { color: var(--fg); font-weight: 600; }

    /* ─── iPhone 15 Pro frame ─── */
    .device.iphone { position: relative; width: 390px; height: 844px; border-radius: 56px; padding: 12px; background: linear-gradient(160deg, #2a2a2c 0%, #1a1a1c 50%, #0e0e10 100%); box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 0 2px #000 inset, 0 28px 60px -12px rgba(0,0,0,0.45), 0 8px 20px -8px rgba(0,0,0,0.35); isolation: isolate; }
    .device.iphone::before, .device.iphone::after { content: ''; position: absolute; width: 3px; background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.06) 8%, transparent 16%, transparent 84%, rgba(255,255,255,0.04) 92%, transparent 100%); top: 100px; bottom: 100px; pointer-events: none; }
    .device.iphone::before { left: -1px; } .device.iphone::after { right: -1px; }
    .island { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 5; }
    .btn-rail { position: absolute; width: 4px; background: #0a0a0c; border-radius: 2px; }
    .btn-rail.l1 { left: -3px; top: 174px; height: 32px; } .btn-rail.l2 { left: -3px; top: 220px; height: 60px; }
    .btn-rail.l3 { left: -3px; top: 290px; height: 60px; } .btn-rail.r1 { right: -3px; top: 250px; height: 100px; }

    /* ─── Pixel 6 frame ─── */
    .device.pixel { position: relative; width: 412px; height: 900px; border-radius: 42px; padding: 8px; background: linear-gradient(160deg, #2a2a2c 0%, #181818 50%, #0c0c0c 100%); box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 0 2px #000 inset, 0 28px 60px -12px rgba(0,0,0,0.45), 0 8px 20px -8px rgba(0,0,0,0.35); isolation: isolate; }
    .device.pixel .btn-rail { width: 3px; background: #0a0a0c; border-radius: 2px; }
    .device.pixel .btn-rail.r1 { right: -2px; top: 160px; height: 60px; } .device.pixel .btn-rail.r2 { right: -2px; top: 230px; height: 90px; }
    .punch-hole { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 22px; height: 22px; background: #000; border-radius: 50%; z-index: 5; }

    /* ─── Common screen surface ─── */
    .device .screen { position: relative; width: 100%; height: 100%; background: var(--bg); border-radius: 44px; overflow: hidden; display: flex; flex-direction: column; }
    .device.pixel .screen { border-radius: 36px; }
    .statusbar { flex: 0 0 47px; padding: 18px 26px 0; display: flex; align-items: flex-start; justify-content: space-between; font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--fg); letter-spacing: -0.01em; }
    .device.pixel .statusbar { flex-basis: 32px; padding: 12px 22px 0; font-size: 13px; font-weight: 500; }
    .statusbar .right { display: inline-flex; align-items: center; gap: 6px; }
    .statusbar svg { width: 17px; height: 11px; fill: var(--fg); }
    .statusbar .battery { width: 25px; }
    .device.pixel .statusbar svg { width: 15px; height: 11px; }
    .device.pixel .statusbar .battery { width: 22px; height: 11px; }
    .home-indicator { flex: 0 0 28px; position: relative; }
    .home-indicator::after { content: ''; position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); width: 134px; height: 5px; background: var(--fg); border-radius: 999px; opacity: 0.4; }
    .device.pixel .gesture-bar { flex: 0 0 22px; position: relative; }
    .device.pixel .gesture-bar::after { content: ''; position: absolute; left: 50%; bottom: 6px; transform: translateX(-50%); width: 120px; height: 4px; background: var(--fg); border-radius: 999px; opacity: 0.45; }

    /* ─── Splash content layout ─── */
    .splash-main { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 28px; text-align: center; }
    .glyph-mark {
      width: 88px; height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, #8a6b46 0%, #c96442 60%, #d57a4f 100%);
      display: grid; place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-size: 44px; font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 16px 40px -12px rgba(138,107,70,0.45);
      animation: glyph-breathe 2.4s var(--ease-standard) infinite;
    }
    @keyframes glyph-breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 16px 40px -12px rgba(138,107,70,0.45); }
      50% { transform: scale(1.04); box-shadow: 0 20px 48px -10px rgba(138,107,70,0.55); }
    }
    .wordmark { font-family: var(--font-display); font-size: 36px; font-weight: 600; letter-spacing: -0.018em; color: var(--fg); margin: 24px 0 8px; }
    .tagline { font-size: 14px; color: var(--fg-2); line-height: 1.55; margin: 0; max-width: 22ch; }
    .meta-line { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: 0.14em; text-transform: uppercase; color: var(--meta); margin-top: 18px; }

    .splash-bottom {
      padding: 16px 20px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .splash-bottom .cta-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 52px;
      padding: 14px 20px;
      background: var(--accent);
      color: var(--accent-on);
      border: 0; border-radius: 980px;
      font: inherit; font-size: 15px; font-weight: 600;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: transform 100ms var(--ease-standard);
    }
    .splash-bottom .cta-primary:active { transform: scale(0.97); }
    .splash-bottom .cta-secondary {
      display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 48px;
      padding: 12px 20px;
      background: transparent;
      color: var(--fg);
      border: 0;
      font: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer;
    }
    .splash-bottom .legal { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--meta); text-align: center; padding-top: 6px; }

    @media (prefers-reduced-motion: reduce) {
      .glyph-mark { animation: none; }
    }
  </style>
</head>
<body>
  <header class="page-top" data-od-id="page-top">
    <div class="crumbs"><strong>清流</strong> · 启动页 · iOS + Android 同屏</div>
    <a class="back" href="index.html" data-od-id="back-home">
      <svg viewBox="0 0 24 24" aria-hidden><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      返回首页
    </a>
  </header>

  <section class="head" data-od-id="head">
    <p class="eyebrow">ONBOARDING · SPLASH</p>
    <h1>启动页</h1>
    <p class="lede">App 打开的第一屏。品牌主形 + 一句话承诺 + 两个入口（开始新的 / 继续旧的）。动画克制，单帧成立。</p>
  </section>

  <main class="stage-pair">

    <!-- iOS -->
    <article class="stage" data-od-id="ios-splash">
      <div class="caption"><span class="badge">iOS</span> <strong>iPhone 15 Pro</strong> · 启动</div>
      <div class="device iphone">
        <span class="btn-rail l1" aria-hidden></span>
        <span class="btn-rail l2" aria-hidden></span>
        <span class="btn-rail l3" aria-hidden></span>
        <span class="btn-rail r1" aria-hidden></span>
        <span class="island" aria-hidden></span>
        <div class="screen">
          <div class="statusbar"><span class="num">9:41</span><span class="right"><svg viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6"/><rect x="4" y="5" width="3" height="6" rx="0.6"/><rect x="8" y="3" width="3" height="8" rx="0.6"/><rect x="12" y="0" width="3" height="11" rx="0.6"/></svg><svg viewBox="0 0 17 11"><path d="M8.5 1.5C5.5 1.5 2.7 2.6 0.5 4.6L2 6.1C3.8 4.5 6.1 3.6 8.5 3.6c2.4 0 4.7 0.9 6.5 2.5l1.5-1.5c-2.2-2-5-3.1-8-3.1zM3.5 7.6L5 9.1c1-0.9 2.2-1.4 3.5-1.4 1.3 0 2.5 0.5 3.5 1.4l1.5-1.5c-1.4-1.3-3.1-2-5-2-1.9 0-3.6 0.7-5 2zM6.5 10.6l2 2 2-2c-0.5-0.5-1.2-0.8-2-0.8s-1.5 0.3-2 0.8z"/></svg><svg class="battery" viewBox="0 0 25 11"><rect x="0.5" y="0.5" width="21" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-opacity="0.45"/><rect x="22" y="3.5" width="1.5" height="4" rx="0.4" fill="currentColor" fill-opacity="0.45"/><rect x="2" y="2" width="18" height="7" rx="1.4"/></svg></span></div>

          <main class="splash-main" data-od-id="splash-brand">
            <div class="glyph-mark" aria-label="清">清</div>
            <h1 class="wordmark">清流</h1>
            <p class="tagline">陪你慢慢来。</p>
          </main>

          <div class="splash-bottom" data-od-id="splash-cta">
            <button class="cta-primary" data-od-id="cta-start">开始新的 90 天</button>
            <button class="cta-secondary" data-od-id="cta-resume">继续 · 第 23 天</button>
            <p class="legal">v1.0 · 本产品不替代专业心理咨询</p>
          </div>

          <div class="home-indicator" aria-hidden></div>
        </div>
      </div>
    </article>

    <!-- Android -->
    <article class="stage" data-od-id="android-splash">
      <div class="caption"><span class="badge">AND</span> <strong>Pixel 6</strong> · 启动</div>
      <div class="device pixel">
        <span class="btn-rail r1" aria-hidden></span>
        <span class="btn-rail r2" aria-hidden></span>
        <span class="punch-hole" aria-hidden></span>
        <div class="screen">
          <div class="statusbar"><span class="num">9:41</span><span class="right"><svg viewBox="0 0 17 11"><path d="M8.5 1.5C5.5 1.5 2.7 2.6 0.5 4.6L2 6.1C3.8 4.5 6.1 3.6 8.5 3.6c2.4 0 4.7 0.9 6.5 2.5l1.5-1.5c-2.2-2-5-3.1-8-3.1zM3.5 7.6L5 9.1c1-0.9 2.2-1.4 3.5-1.4 1.3 0 2.5 0.5 3.5 1.4l1.5-1.5c-1.4-1.3-3.1-2-5-2-1.9 0-3.6 0.7-5 2zM6.5 10.6l2 2 2-2c-0.5-0.5-1.2-0.8-2-0.8s-1.5 0.3-2 0.8z"/></svg><svg class="battery" viewBox="0 0 25 11"><rect x="0.5" y="0.5" width="21" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-opacity="0.45"/><rect x="22" y="3.5" width="1.5" height="4" rx="0.4" fill="currentColor" fill-opacity="0.45"/><rect x="2" y="2" width="18" height="7" rx="1.4"/></svg></span></div>

          <main class="splash-main" data-od-id="splash-brand-and">
            <div class="glyph-mark" aria-label="清">清</div>
            <h1 class="wordmark">清流</h1>
            <p class="tagline">陪你慢慢来。</p>
          </main>

          <div class="splash-bottom" data-od-id="splash-cta-and">
            <button class="cta-primary" data-od-id="cta-start-and">开始新的 90 天</button>
            <button class="cta-secondary" data-od-id="cta-resume-and">继续 · 第 23 天</button>
            <p class="legal">v1.0 · 本产品不替代专业心理咨询</p>
          </div>

          <div class="gesture-bar" aria-hidden></div>
        </div>
      </div>
    </article>

  </main>
</body>
</html>
